<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading... | Blog</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="/">AimeeWang</a></div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/#about">About</a>
            <a href="/#skills">Skills</a>
            <a href="/#contact">Contact</a>
            <a href="/blog" class="active">Blog</a>
            <a href="/projects">Projects</a>
        </div>
    </nav>

    <article class="post-container" id="postContent">
        <div class="loading-spinner">Loading post...</div>
    </article>

    <footer class="footer">
        <p>&copy; 2025 AimeeWang. Microsoft AI Support Engineer.</p>
    </footer>

    <script>
        const slug = window.location.pathname.replace("/blog/", "");

        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, {language: lang}).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true
        });

        async function loadPost() {
            try {
                const res = await fetch(`/api/posts/${encodeURIComponent(slug)}`);
                if (!res.ok) {
                    document.getElementById("postContent").innerHTML =
                        '<div class="empty-state"><h2>Post Not Found</h2><p><a href="/blog">Back to Blog</a></p></div>';
                    return;
                }
                const post = await res.json();
                document.title = `${post.title} | Blog`;

                document.getElementById("postContent").innerHTML = `
                    <header class="post-header">
                        <a href="/blog" class="back-link">&larr; Back to Blog</a>
                        <h1>${esc(post.title)}</h1>
                        <div class="post-meta">
                            <span>${new Date(post.published_at).toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'})}</span>
                            <span>&bull;</span>
                            <span>${post.views} views</span>
                        </div>
                        <div class="blog-tags">
                            ${(post.tags||[]).map(t => `<a href="/blog?tag=${encodeURIComponent(t)}" class="tag">${esc(t)}</a>`).join("")}
                        </div>
                    </header>
                    <div class="post-body">${marked.parse(post.content)}</div>
                    <div class="post-footer">
                        <a href="/blog" class="btn">&larr; All Posts</a>
                    </div>
                `;
                document.querySelectorAll("pre code").forEach(block => hljs.highlightElement(block));
            } catch (e) {
                document.getElementById("postContent").innerHTML =
                    '<div class="empty-state"><h2>Error loading post</h2><p><a href="/blog">Back to Blog</a></p></div>';
            }
        }

        function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
        loadPost();
    </script>
</body>
</html>
