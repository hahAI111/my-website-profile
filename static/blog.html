<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | AimeeWang</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="/">AimeeWang</a></div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/#about">About</a>
            <a href="/#skills">Skills</a>
            <a href="/#contact">Contact</a>
            <a href="/blog" class="active">Blog</a>
            <a href="/projects">Projects</a>
        </div>
    </nav>

    <section class="section blog-section">
        <h2 class="section-title">Blog</h2>
        <p class="section-subtitle">Thoughts on Azure, AI Support, Python, and engineering at Microsoft.</p>

        <div class="blog-filters" id="tagFilters">
            <button class="tag-btn active" data-tag="">All</button>
        </div>

        <div class="blog-grid" id="blogGrid">
            <div class="loading-spinner">Loading posts...</div>
        </div>

        <div class="pagination" id="pagination"></div>
    </section>

    <footer class="footer">
        <p>&copy; 2025 AimeeWang. Microsoft AI Support Engineer.</p>
    </footer>

    <script>
        let currentTag = "";
        let currentPage = 1;

        async function loadTags() {
            try {
                const res = await fetch("/api/tags");
                const tags = await res.json();
                const container = document.getElementById("tagFilters");
                tags.forEach(t => {
                    const btn = document.createElement("button");
                    btn.className = "tag-btn";
                    btn.dataset.tag = t.name;
                    btn.textContent = `${t.name} (${t.post_count})`;
                    btn.addEventListener("click", () => {
                        currentTag = t.name;
                        currentPage = 1;
                        document.querySelectorAll(".tag-btn").forEach(b => b.classList.remove("active"));
                        btn.classList.add("active");
                        loadPosts();
                    });
                    container.appendChild(btn);
                });
                document.querySelector('.tag-btn[data-tag=""]').addEventListener("click", () => {
                    currentTag = "";
                    currentPage = 1;
                    document.querySelectorAll(".tag-btn").forEach(b => b.classList.remove("active"));
                    document.querySelector('.tag-btn[data-tag=""]').classList.add("active");
                    loadPosts();
                });
            } catch (e) { console.error("Failed to load tags", e); }
        }

        async function loadPosts() {
            const grid = document.getElementById("blogGrid");
            grid.innerHTML = '<div class="loading-spinner">Loading...</div>';
            try {
                const params = new URLSearchParams({ page: currentPage, per_page: 10 });
                if (currentTag) params.set("tag", currentTag);
                const res = await fetch("/api/posts?" + params);
                const data = await res.json();
                if (!data.posts.length) {
                    grid.innerHTML = '<p class="empty-state">No posts found.</p>';
                    document.getElementById("pagination").innerHTML = "";
                    return;
                }
                grid.innerHTML = data.posts.map(p => `
                    <article class="blog-card" onclick="location.href='/blog/${p.slug}'">
                        <div class="blog-card-body">
                            <h3>${esc(p.title)}</h3>
                            <p class="blog-summary">${esc(p.summary || "")}</p>
                            <div class="blog-meta">
                                <span>${new Date(p.published_at).toLocaleDateString()}</span>
                                <span>${p.views} views</span>
                            </div>
                            <div class="blog-tags">
                                ${(p.tags||[]).map(t => `<span class="tag">${esc(t)}</span>`).join("")}
                            </div>
                        </div>
                    </article>
                `).join("");

                const totalPages = Math.ceil(data.total / data.per_page);
                const pag = document.getElementById("pagination");
                if (totalPages <= 1) { pag.innerHTML = ""; return; }
                let html = "";
                if (currentPage > 1) html += `<button onclick="goPage(${currentPage-1})">&laquo; Prev</button>`;
                html += `<span>Page ${currentPage} of ${totalPages}</span>`;
                if (currentPage < totalPages) html += `<button onclick="goPage(${currentPage+1})">Next &raquo;</button>`;
                pag.innerHTML = html;
            } catch (e) {
                grid.innerHTML = '<p class="empty-state">Failed to load posts.</p>';
            }
        }

        function goPage(p) { currentPage = p; loadPosts(); window.scrollTo(0, 0); }
        function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

        loadTags();
        loadPosts();
    </script>
</body>
</html>
